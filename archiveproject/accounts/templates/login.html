{% extends 'login_base.html' %}

{% block content %}
    <div class="flex-col">
        <h1 class="text-white text-4xl font-bold text-center mb-12">SISTEM ARSIP PWU</h1>
        <div class="bg-white p-8 rounded shadow-md w-96">
            <h2 class="text-black text-3xl font-bold mb-6 text-center">LOGIN</h2>

            <form method="POST" action="{% url 'accounts:login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <input type="text" name="username" placeholder="Username"
                     class="text-black w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>

                <div class="mb-3">
                    <input id="password" type="password" name="password" placeholder="Password"
                     class="text-black w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>

                <div class="flex items-center justify-between">

                    <label class="flex items-center text-sm text-black font-semibold w-60">
                        <input type="checkbox" onClick="togglePassword()" name="show-password" class="bg-white border-gray-300 text-blue-500 mr-2">
                        Show Password
                    </label>

<!--                    <a href="" class="text-sm text-black font-semibold w-full text-right">-->
<!--                        Lupa password?-->
<!--                    </a>-->
                </div>
                <div class="flex justify-center mt-6">
                   <button type="submit" class="bg-blue-900 text-white w-full py-2 rounded-md
                    hover:bg-blue-950 focus:outline-none">Masuk</button>
                </div>

                {% if error %}
                    <p class="text-red-600 mt-6 text-center">{{ error }}</p>
                {% endif %}
            </form>

        </div>
    </div>

<script>
function togglePassword() {
    const input = document.getElementById("password");

    if (input.type === "password") {
        input.type = "text";
    } else {
        input.type = "password";
    }
}
</script>
{% endblock %}
