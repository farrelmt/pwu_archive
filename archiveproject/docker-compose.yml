services:
  db:
    image: postgres:15.18
    restart: unless-stopped
    init: true
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  web:
    build:
      context: .
    restart: unless-stopped
    init: true
    user: "10001:10001"
    command:
      - sh
      - -c
      - >
        python manage.py collectstatic --noinput &&
        python manage.py migrate &&
        exec gunicorn --chdir /app
        --bind 0.0.0.0:8000
        --timeout 90
        --workers 3
        --threads 2
        --max-requests 1000
        --max-requests-jitter 100
        --worker-tmp-dir /tmp
        --forwarded-allow-ips='*'
        --no-control-socket
        --access-logfile -
        archiveproject.wsgi:application
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT: ${DB_PORT}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      EMAIL_TO_REPORT: ${EMAIL_TO_REPORT}
      SESSION_COOKIE_SECURE: "true"
      CSRF_COOKIE_SECURE: "true"
      CSRF_COOKIE_HTTPONLY: "true"
      SECURE_SSL_REDIRECT: "true"
      SECURE_HSTS_SECONDS: "31536000"
      SECURE_HSTS_INCLUDE_SUBDOMAINS: "true"
      SECURE_HSTS_PRELOAD: "true"
      SESSION_COOKIE_AGE: "28800"
      SESSION_EXPIRE_AT_BROWSER_CLOSE: "true"
      SESSION_SAVE_EVERY_REQUEST: "true"
      XDG_CACHE_HOME: /tmp/.cache
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - backend
      - edge

  nginx:
    image: nginx:1.31.2
    restart: unless-stopped
    init: true
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web
    read_only: true
    tmpfs:
      - /var/cache/nginx:rw,noexec,nosuid,size=32m
      - /var/run:rw,noexec,nosuid,size=4m
      - /tmp:rw,noexec,nosuid,size=4m
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    networks:
      - backend
      - edge

  cloudflared:
    image: cloudflare/cloudflared:2026.6.1
    command: tunnel --no-autoupdate --protocol http2 run
    restart: unless-stopped
    init: true
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - nginx
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=8m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - edge

networks:
  backend:
    internal: true
  edge:

volumes:
  static_volume:
  media_volume:
  postgres_data:
