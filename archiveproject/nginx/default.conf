map $http_cf_connecting_ip $client_ip {
    default $http_cf_connecting_ip;
    ""      $remote_addr;
}

map $http_x_forwarded_proto $forwarded_proto {
    default https;
    http    http;
    https   https;
}

limit_req_zone $client_ip zone=auth_limit:10m rate=10r/m;
limit_req_zone $client_ip zone=expensive_limit:10m rate=10r/m;

server {
    listen 80;
    server_name pwujatim.site www.pwujatim.site;
    server_tokens off;

    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 10M;
    client_body_timeout 15s;
    client_header_timeout 15s;
    keepalive_timeout 30s;
    send_timeout 30s;
    limit_req_status 429;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header Referrer-Policy;
    proxy_hide_header Permissions-Policy;

    location = /accounts/login/ {
        limit_req zone=auth_limit burst=5 nodelay;
        set $django_upstream http://web:8000;
        proxy_pass $django_upstream;
        proxy_set_header X-Forwarded-For $client_ip;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location = /admin/login/ {
        limit_req zone=auth_limit burst=5 nodelay;
        set $django_upstream http://web:8000;
        proxy_pass $django_upstream;
        proxy_set_header X-Forwarded-For $client_ip;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location = /report/ {
        limit_req zone=expensive_limit burst=3 nodelay;
        set $django_upstream http://web:8000;
        proxy_pass $django_upstream;
        proxy_set_header X-Forwarded-For $client_ip;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Host $host;
        proxy_redirect off;
        proxy_read_timeout 30s;
    }

    location ~ ^/disposisi/preview/.+/pdf/$ {
        limit_req zone=expensive_limit burst=3 nodelay;
        set $django_upstream http://web:8000;
        proxy_pass $django_upstream;
        proxy_set_header X-Forwarded-For $client_ip;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Host $host;
        proxy_redirect off;
        proxy_read_timeout 90s;
    }

    location / {
        set $django_upstream http://web:8000;
        proxy_pass $django_upstream;
        proxy_set_header X-Forwarded-For $client_ip;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Host $host;
        proxy_redirect off;
        proxy_connect_timeout 15s;
        proxy_read_timeout 90s;
        proxy_send_timeout 30s;
    }

    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /protected-media/ {
        internal;
        alias /app/media/;
        add_header Cache-Control "private, no-store, max-age=0" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    location /media/ {
        return 404;
    }
}
